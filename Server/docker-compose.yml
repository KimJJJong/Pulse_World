services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 3s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  mongodb:
    image: mongo:8.2.11-noble
    container_name: mongodb_analytics
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE:-rhythm_analytics}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: [ "CMD-SHELL", 'mongosh --quiet --host localhost --username "$${MONGO_INITDB_ROOT_USERNAME}" --password "$${MONGO_INITDB_ROOT_PASSWORD}" --authenticationDatabase admin --eval "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)"' ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes", "--appendfsync", "everysec" ]
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"

  controlplane:
    build:
      context: ..
      dockerfile: Server/ControlPlaneServer/Dockerfile
    container_name: controlplane_server
    restart: always
    depends_on:
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      DOTNET_ENVIRONMENT: "Docker"
      # ControlPlane uses defaults (DB 0) from appsettings.json, just updating host/pass
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
    ports:
      - "${CONTROLPLANE_PORT:-5001}:5001"

  apiserver:
    build:
      context: ..
      dockerfile: Server/ApiServer/Dockerfile
    container_name: api_server
    restart: always
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      controlplane:
        condition: service_started
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      DOTNET_ENVIRONMENT: "Docker"
      SystemApiKey: "${SYSTEM_API_KEY}"
      Db__ConnectionString: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true;Maximum Pool Size=50"
      Mongo__Enabled: "true"
      Mongo__ConnectionString: "mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongodb:27017/${MONGO_APP_DATABASE:-rhythm_analytics}?authSource=${MONGO_APP_DATABASE:-rhythm_analytics}"
      Mongo__DatabaseName: "${MONGO_APP_DATABASE:-rhythm_analytics}"
      Mongo__GameResultsCollection: "game_results"
      # Redis database 1 remains configured in appsettings.json; only the Docker endpoint and password are overridden here.
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=False"
      ControlPlane__Address: "http://controlplane:5001"
      ItemDataPath: "/app/Content/Data/Json"
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - ./migrations:/app/migrations
      - ./GameServer/Content:/app/Content

  townserver:
    build:
      context: ..
      dockerfile: Server/GameServer/Dockerfile
    container_name: town_server
    command: [ "--role", "Town" ]
    restart: always
    depends_on:
      controlplane:
        condition: service_started
      apiserver:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      DOTNET_ENVIRONMENT: "Docker"
      ControlPlane__Address: "http://controlplane:5001"
      ApiServer__BaseUrl: "http://apiserver:5000"
      ApiServer__SystemApiKey: "${SYSTEM_API_KEY}"
      ApiServer__RequestTimeoutSeconds: "5"
      Server__Public__Host: "${SERVER_PUBLIC_HOST:-127.0.0.1}"
      Server__Public__Port: "${TOWN_PUBLIC_PORT:-13221}"

      # Content Path Overrides (mapped via volume)
      Server__Content__DefaultBaseDir: "/app/Content/02.Town"
      Server__Content__Town__BaseDir: "/app/Content/02.Town"

    ports:
      - "${TOWN_PUBLIC_PORT:-13221}:13221"
    volumes:
      - ./GameServer/Content:/app/Content

  gameserver:
    build:
      context: ..
      dockerfile: Server/GameServer/Dockerfile
    container_name: game_server
    command: [ "--role", "Game" ]
    restart: always
    depends_on:
      controlplane:
        condition: service_started
      apiserver:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      DOTNET_ENVIRONMENT: "Docker"
      ControlPlane__Address: "http://controlplane:5001"
      ApiServer__BaseUrl: "http://apiserver:5000"
      ApiServer__SystemApiKey: "${SYSTEM_API_KEY}"
      ApiServer__RequestTimeoutSeconds: "5"
      Server__Public__Host: "${SERVER_PUBLIC_HOST:-127.0.0.1}"
      Server__Public__Port: "${GAME_PUBLIC_PORT:-13222}"

      # Content Path Overrides
      Server__Content__DefaultBaseDir: "/app/Content/01.Game"
      Server__Content__Game__BaseDir: "/app/Content/01.Game"

    ports:
      - "${GAME_PUBLIC_PORT:-13222}:13222"
    volumes:
      - ./GameServer/Content:/app/Content

volumes:
  mongodb_data:
  redis_data:
