<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pulse Stones Grid Visualization</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ddd;
        }

        #subtitle {
            font-size: 1.5rem;
            color: #0ff;
            min-height: 2rem;
            transition: color 0.3s;
        }

        .scene {
            perspective: 1200px;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grid-container {
            position: relative;
            transform: rotateX(60deg) translateZ(-100px);
            transform-style: preserve-3d;
            background: #444;
            padding: 5px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 120px);
            grid-template-rows: repeat(5, 120px);
            gap: 4px;
        }

        .tile {
            background-color: #6C9F20;
            border: 1px solid #5A8F1A;
            transition: all 0.2s ease-out;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Overcharge effects */
        .tile.charge-1::after { content: ''; position: absolute; inset: 0; background: rgba(255, 200, 0, 0.4); box-shadow: 0 0 20px rgba(255, 200, 0, 0.5); }
        .tile.charge-2::after { content: ''; position: absolute; inset: 0; background: rgba(255, 100, 0, 0.6); box-shadow: 0 0 30px rgba(255, 100, 0, 0.7); }
        .tile.charge-3::after { content: ''; position: absolute; inset: 0; background: rgba(255, 0, 0, 0.8); box-shadow: 0 0 50px rgba(255, 0, 0, 0.9); }
        .tile.lightning { background-color: #0ff !important; box-shadow: 0 0 80px #0ff, inset 0 0 30px #fff; z-index: 10; transform: translateZ(20px); }

        /* Glass echo effects */
        .echo-shard {
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            background: rgba(100, 255, 255, 0.8);
            border: 2px solid white;
            box-shadow: 0 0 15px cyan;
            border-radius: 4px;
            transition: all 0.1s ease-out;
            z-index: 30;
        }

        .shatter {
            background-color: white !important;
            box-shadow: 0 0 60px cyan, inset 0 0 30px cyan;
            transform: scale(1.1) translateZ(15px);
            transition: all 0.05s;
        }

        .player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(255,255,255,0.5);
            transform: translate(-50%, -50%) translateZ(40px);
            transition: all 0.15s ease-out;
            z-index: 20;
        }

        /* Pulse indicator */
        #pulse-ring {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 4px solid cyan;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes pulse-anim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        .pulse-active { animation: pulse-anim 0.4s ease-out forwards; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="title">맥석(Pulse Stone) 효과 시연</div>
    <div id="subtitle">준비 중...</div>
</div>

<div class="scene">
    <div class="grid-container grid" id="grid">
        <!-- 5x5 Tiles will be generated here -->
        <div id="pulse-ring"></div>
        <div class="player" id="player"></div>
    </div>
</div>

<script>
    // 5x5 = 25 tiles
    const gridContainer = document.querySelector('.grid');
    const tiles = [];
    for (let i = 0; i < 25; i++) {
        const t = document.createElement('div');
        t.className = 'tile';
        gridContainer.appendChild(t);
        tiles.push(t);
    }

    const player = document.getElementById('player');
    const subtitle = document.getElementById('subtitle');
    const pulseRing = document.getElementById('pulse-ring');

    function getPos(index) {
        const x = index % 5;
        const y = Math.floor(index / 5);
        return { 
            left: (x * 124 + 60) + 'px', 
            top: (y * 124 + 60) + 'px' 
        };
    }

    function movePlayer(index) {
        const pos = getPos(index);
        player.style.left = pos.left;
        player.style.top = pos.top;
    }

    function popPulse(index) {
        const pos = getPos(index);
        pulseRing.style.left = pos.left;
        pulseRing.style.top = pos.top;
        pulseRing.classList.remove('pulse-active');
        void pulseRing.offsetWidth; 
        pulseRing.classList.add('pulse-active');
    }

    function clearBoard() {
        tiles.forEach(t => t.className = 'tile');
        const shards = document.querySelectorAll('.echo-shard');
        shards.forEach(s => s.remove());
    }

    const beatMs = 600; // 100 BPM
    const targetTile = 12; // center tile

    async function wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function runDemo() {
        while (true) {
            // Setup
            clearBoard();
            movePlayer(22); // bottom middle
            subtitle.innerText = "준비 중...";
            subtitle.style.color = "#ddd";
            await wait(1000);

            // -----------------------------------------------------------------
            // PHASE 1: 과충전 맥석 (Overcharge)
            // -----------------------------------------------------------------
            subtitle.innerText = "[과충전 맥석] 3타 축적 준비";
            subtitle.style.color = "#FF9900";
            await wait(1000);

            movePlayer(22);
            await wait(beatMs);

            // Beat 1
            popPulse(targetTile);
            tiles[targetTile].classList.add('charge-1');
            subtitle.innerText = "[과충전] 1타 축적";
            await wait(beatMs);

            // Beat 2
            popPulse(targetTile);
            tiles[targetTile].classList.remove('charge-1');
            tiles[targetTile].classList.add('charge-2');
            subtitle.innerText = "[과충전] 2타 축적";
            await wait(beatMs);

            // Beat 3
            popPulse(targetTile);
            tiles[targetTile].classList.remove('charge-2');
            tiles[targetTile].classList.add('charge-3');
            subtitle.innerText = "[과충전] 3타 완충! 다음 정박 타격 시 폭발";
            subtitle.style.color = "#FF0000";
            await wait(beatMs);

            // Beat 4 (Explosion)
            subtitle.innerText = "[과충전 폭발!] 방어 패턴 강제 파괴 (Interrupt)";
            subtitle.style.color = "#00FFFF";
            tiles[targetTile].classList.remove('charge-3');
            
            // AoE Lightning
            const aoe = [6,7,8,11,12,13,16,17,18];
            aoe.forEach(i => tiles[i].classList.add('lightning'));
            player.style.transform = "translate(-50%, -50%) translateZ(80px) scale(1.5)";
            
            await wait(200);
            aoe.forEach(i => tiles[i].classList.remove('lightning'));
            await wait(100);
            aoe.forEach(i => tiles[i].classList.add('lightning'));
            await wait(400);

            aoe.forEach(i => tiles[i].classList.remove('lightning'));
            player.style.transform = "translate(-50%, -50%) translateZ(40px)";

            await wait(1500);

            // -----------------------------------------------------------------
            // PHASE 2: 유리 메아리 맥석 (Glass Echo)
            // -----------------------------------------------------------------
            clearBoard();
            movePlayer(22);
            subtitle.innerText = "[유리 메아리 맥석] 타격 시 잔향 축적 준비";
            subtitle.style.color = "#00FFFF";
            await wait(1000);

            // Accumulate echoes
            const echoShards = [];
            for(let i=0; i<4; i++) {
                // hit target
                popPulse(targetTile);
                tiles[targetTile].classList.add('shatter');
                setTimeout(() => tiles[targetTile].classList.remove('shatter'), 100);
                
                // create shard floating near player
                const shard = document.createElement('div');
                shard.className = 'echo-shard';
                shard.style.left = player.style.left;
                shard.style.top = player.style.top;
                // arrange shards in an arc above player
                const angle = -135 + (i * 30);
                const xOffset = Math.cos(angle * Math.PI / 180) * 45;
                const yOffset = Math.sin(angle * Math.PI / 180) * 45;
                shard.style.transform = `translate(calc(-50% + ${xOffset}px), calc(-50% + ${yOffset}px)) translateZ(50px) rotate(45deg)`;
                
                gridContainer.appendChild(shard);
                echoShards.push(shard);
                
                subtitle.innerText = `[유리 메아리] 일반 타격 - 잔향 누적 ${i+1}/4`;
                await wait(beatMs);
            }

            // Skill Activation
            subtitle.innerText = "[유리 메아리] 스킬 발동! (누적 타격 일제 쏟아붓기)";
            subtitle.style.color = "#FFFFFF";
            player.style.transform = "translate(-50%, -50%) translateZ(60px) scale(1.2)";
            await wait(beatMs / 2); // Wait half beat

            // Rapid detonations on the target
            for(let i=0; i<4; i++) {
                const shard = echoShards[i];
                
                // shoot shard to target
                shard.style.left = getPos(targetTile).left;
                shard.style.top = getPos(targetTile).top;
                shard.style.transform = `translate(-50%, -50%) translateZ(20px) rotate(45deg)`;
                
                await wait(80); // travel time

                // explode on target
                tiles[targetTile].classList.add('shatter');
                shard.style.background = 'white';
                shard.style.transform = 'translate(-50%, -50%) translateZ(20px) scale(3)';
                shard.style.opacity = '0';
                
                // Extra pulse ring
                popPulse(targetTile);
                
                await wait(70);
                tiles[targetTile].classList.remove('shatter');
                await wait(50); // very rapid hits
            }

            player.style.transform = "translate(-50%, -50%) translateZ(40px)";
            
            await wait(2000);
        }
    }

    // Start Demo loop
    window.onload = () => {
        setTimeout(runDemo, 500);
    };

</script>
</body>
</html>
