<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" style="background-color: transparent; font-family: 'Segoe UI', sans-serif;">
  <defs>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 가이드 라인 -->
  <line x1="200" y1="80" x2="200" y2="670" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="6,6" />
  <line x1="450" y1="80" x2="450" y2="670" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="6,6" />
  <line x1="700" y1="80" x2="700" y2="670" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="6,6" />
  
  <!-- 상단 라벨 -->
  <rect x="140" y="30" width="130" height="50" rx="15" fill="#f8f9fa" stroke="#d0d0d0" stroke-width="2" />
  <text x="205" y="62" fill="#202124" font-size="22" font-weight="bold" text-anchor="middle">입력 가이드</text>
  
  <rect x="370" y="30" width="160" height="50" rx="15" fill="#f8f9fa" stroke="#d0d0d0" stroke-width="2" />
  <text x="450" y="62" fill="#202124" font-size="22" font-weight="bold" text-anchor="middle">정박자 (Beat 1)</text>
  
  <rect x="620" y="30" width="160" height="50" rx="15" fill="#f8f9fa" stroke="#d0d0d0" stroke-width="2" />
  <text x="700" y="62" fill="#202124" font-size="22" font-weight="bold" text-anchor="middle">정박자 (Beat 2)</text>

  <!-- Player 01 -->
  <text x="50" y="140" fill="#202124" font-size="30" font-weight="bold">Player 01</text>
  <text x="50" y="170" fill="#5f6368" font-size="20">(로컬 파형)</text>
  <line x1="150" y1="180" x2="850" y2="180" stroke="#d0d0d0" stroke-width="2" />
  <path d="M 150 180 L 200 180 c 45 -120, 80 -120, 125 0 s 80 120, 125 0 c 45 -120, 80 -120, 125 0 s 80 120, 125 0 L 850 180" stroke="#1a73e8" stroke-width="4" fill="none" stroke-linecap="round" />
  <circle cx="200" cy="180" r="6" fill="#1a73e8" />
  <text x="220" y="120" fill="#1a73e8" font-size="24" font-weight="bold">1 Beat = 1 파장 출력</text>

  <!-- Server -->
  <text x="50" y="310" fill="#202124" font-size="30" font-weight="bold">Server</text>
  <text x="50" y="340" fill="#5f6368" font-size="20">(네트워크 딜레이)</text>
  <line x1="150" y1="350" x2="850" y2="350" stroke="#d0d0d0" stroke-width="2" />
  <line x1="200" y1="350" x2="250" y2="350" stroke="#ea4335" stroke-width="6" />
  <circle cx="200" cy="350" r="6" fill="#ea4335" />
  <circle cx="250" cy="350" r="6" fill="#ea4335" />
  <text x="225" y="325" fill="#ea4335" font-size="24" font-weight="bold" text-anchor="middle">Delay</text>
  <line x1="250" y1="350" x2="250" y2="670" stroke="#ea4335" stroke-width="2" stroke-dasharray="4,4" />

  <!-- Player 02 -->
  <text x="50" y="480" fill="#202124" font-size="30" font-weight="bold">Player 02</text>
  <text x="50" y="510" fill="#5f6368" font-size="20">(위상 보간 및 동기화)</text>
  <line x1="150" y1="520" x2="850" y2="520" stroke="#d0d0d0" stroke-width="2" />
  
  <path d="M 200 520 c 45 -120, 80 -120, 125 0 s 80 120, 125 0 c 45 -120, 80 -120, 125 0 s 80 120, 125 0" stroke="#b0b0b0" stroke-width="2" stroke-dasharray="6,6" fill="none" opacity="0.6" />
  
  <path d="M 250 520 c 45 -120, 80 -120, 125 0 s 80 120, 125 0 c 45 -120, 80 -120, 125 0" stroke="#ea4335" stroke-width="3" stroke-dasharray="8,6" fill="none" opacity="0.8" />
  <text x="310" y="680" fill="#ea4335" font-size="24" font-weight="bold">지연(Delay) 발생 엇박자 파형</text>
  
  <rect x="200" y="370" width="50" height="300" fill="#ea4335" opacity="0.15" />
  <text x="225" y="470" fill="#ea4335" font-size="24" font-weight="bold" text-anchor="middle">MUTE</text>
  
  <!-- sync path -->
  <path d="M 150 520 L 250 520 C 270 520, 280 400, 325 520 C 370 640, 405 640, 450 520 c 45 -120, 80 -120, 125 0 s 80 120, 125 0 L 850 520" stroke="#34a853" stroke-width="4" fill="none" filter="url(#glow-green)" />
  
  <text x="287" y="585" fill="#34a853" font-size="22" font-weight="bold" text-anchor="middle">Reverb 블렌딩</text>
  <path d="M 250 525 L 250 550 L 325 550" stroke="#34a853" stroke-width="1.5" fill="none" />
  
  <circle cx="250" cy="520" r="5" fill="#34a853" />
  <circle cx="325" cy="520" r="5" fill="#34a853" />
  <text x="460" y="465" fill="#34a853" font-size="26" font-weight="bold">위상 합류 완벽 동기화!</text>
</svg>
