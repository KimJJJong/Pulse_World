<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Beat guide lock duration concept mockup">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#718281"/>
      <stop offset="0.52" stop-color="#9c9f75"/>
      <stop offset="1" stop-color="#1c321e"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#876d40" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#9b7446" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="lockRemaining" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff6b5" stop-opacity="0.92"/>
      <stop offset="0.45" stop-color="#f5a447" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#ce6d28" stop-opacity="0.32"/>
    </linearGradient>
    <linearGradient id="elapsed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b9291" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#b6c5c7" stop-opacity="0.34"/>
    </linearGradient>
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="amberGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .grid { stroke: #77e6f2; stroke-width: 1.4; stroke-opacity: .48; }
      .grid-far { stroke: #77e6f2; stroke-width: 1; stroke-opacity: .22; }
      .arrow { fill: none; stroke: #e8f5ec; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; opacity: .82; }
      .arrow-dim { fill: none; stroke: #b9c9c4; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; opacity: .34; }
      .arrow-glow { fill: none; stroke: #effff9; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; opacity: .96; filter: url(#cyanGlow); }
      .tick { stroke: #ffe4a6; stroke-width: 4; stroke-linecap: round; opacity: .78; filter: url(#amberGlow); }
      .tick-dim { stroke: #b9c9c4; stroke-width: 3; stroke-linecap: round; opacity: .23; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="url(#sky)"/>
  <path d="M455 0 L745 0 L840 420 L360 420 Z" fill="url(#road)" opacity=".9"/>
  <rect y="0" width="1200" height="420" fill="#0b2318" opacity=".13"/>

  <g opacity=".55">
    <path class="grid-far" d="M0 72H1200M0 150H1200M0 224H1200M0 300H1200M0 376H1200"/>
    <path class="grid" d="M83 420L470 0M210 420L505 0M340 420L540 0M470 420L575 0M600 420V0M730 420L625 0M860 420L660 0M990 420L695 0M1117 420L730 0"/>
  </g>

  <g filter="url(#softShadow)">
    <ellipse cx="600" cy="158" rx="95" ry="24" fill="#000" opacity=".28"/>
    <path d="M543 0 C550 58 558 109 576 143 C585 159 615 159 624 143 C642 109 650 58 657 0 Z" fill="#5e4738"/>
    <path d="M500 0 C515 56 532 112 565 147 C574 157 595 151 592 137 C580 89 568 42 558 0 Z" fill="#876356"/>
    <path d="M700 0 C685 56 668 112 635 147 C626 157 605 151 608 137 C620 89 632 42 642 0 Z" fill="#876356"/>
    <rect x="535" y="139" width="48" height="41" rx="13" fill="#29313a"/>
    <rect x="616" y="139" width="48" height="41" rx="13" fill="#29313a"/>
    <rect x="528" y="169" width="63" height="31" rx="12" fill="#34424c"/>
    <rect x="609" y="169" width="63" height="31" rx="12" fill="#34424c"/>
    <path d="M688 18 C728 61 737 101 713 139" fill="none" stroke="#724139" stroke-width="16" stroke-linecap="round"/>
  </g>

  <g>
    <line x1="246" y1="258" x2="956" y2="258" stroke="#dff8f4" stroke-width="4" stroke-linecap="round" opacity=".18"/>
    <line x1="246" y1="258" x2="956" y2="258" stroke="#48f2ff" stroke-width="1.5" stroke-linecap="round" opacity=".34"/>

    <line x1="404" y1="258" x2="600" y2="258" stroke="url(#elapsed)" stroke-width="11" stroke-linecap="round"/>
    <line x1="600" y1="258" x2="766" y2="258" stroke="url(#lockRemaining)" stroke-width="11" stroke-linecap="round" filter="url(#amberGlow)"/>
    <line x1="600" y1="258" x2="766" y2="258" stroke="#ffb35d" stroke-width="2.5" stroke-linecap="round" opacity=".82"/>

    <line class="tick-dim" x1="444" y1="246" x2="444" y2="270"/>
    <line class="tick-dim" x1="490" y1="246" x2="490" y2="270"/>
    <line class="tick-dim" x1="536" y1="246" x2="536" y2="270"/>
    <line class="tick" x1="642" y1="244" x2="642" y2="272"/>
    <line class="tick" x1="684" y1="244" x2="684" y2="272"/>
    <line class="tick" x1="726" y1="244" x2="726" y2="272"/>

    <circle cx="697" cy="258" r="8" fill="#fff4b5" opacity=".92" filter="url(#amberGlow)"/>
    <circle cx="697" cy="258" r="3.5" fill="#fff" opacity=".96"/>

    <path d="M600 235 L623 258 L600 281 L577 258 Z" fill="#0f1e24" stroke="#effff9" stroke-width="4" filter="url(#cyanGlow)"/>
    <circle cx="600" cy="258" r="8" fill="#64f8ff"/>

    <path d="M766 232 L766 284" stroke="#effff9" stroke-width="5" stroke-linecap="round" filter="url(#cyanGlow)"/>
    <path d="M752 244 L766 232 L780 244" fill="none" stroke="#effff9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
    <path d="M752 272 L766 284 L780 272" fill="none" stroke="#effff9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
  </g>

  <g>
    <path class="arrow" d="M284 231 L238 258 L284 285"/>
    <path class="arrow-dim" d="M422 231 L376 258 L422 285"/>
    <path class="arrow-dim" d="M552 231 L506 258 L552 285"/>
    <path class="arrow-dim" d="M651 231 L697 258 L651 285"/>
    <path class="arrow-glow" d="M793 231 L839 258 L793 285"/>
    <path class="arrow" d="M927 231 L973 258 L927 285"/>
  </g>

  <g opacity=".38">
    <ellipse cx="600" cy="313" rx="73" ry="10" fill="#25efff" filter="url(#cyanGlow)"/>
    <ellipse cx="600" cy="313" rx="54" ry="5" fill="#f7fff9"/>
  </g>
</svg>
